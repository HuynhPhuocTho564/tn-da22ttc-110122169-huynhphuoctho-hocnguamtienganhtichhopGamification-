version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: pronunciation_db_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: english_app
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js Frontend - Development mode (hot-reload)
  frontend:
    image: node:24-alpine
    container_name: pronunciation_frontend_dev
    working_dir: /app
    command: sh -c "npm install && npx prisma generate && npm run dev"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/english_app
      AUTH_SECRET: your-secret-here-min-32-chars-12345
      AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mount source code for hot-reload
      - ./frontend:/app
      # Exclude node_modules (use container's own)
      - /app/node_modules
      # Exclude .next (build inside container)
      - /app/.next

  # FastAPI Backend (optional)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pronunciation_backend_dev
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/english_app
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data_dev:
    name: pronunciation_postgres_data_dev
