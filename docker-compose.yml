version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: pronunciation_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-english_app}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js Frontend (main app)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pronunciation_frontend
    restart: unless-stopped
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-english_app}
      
      # Auth (replace with your secrets)
      AUTH_SECRET: ${AUTH_SECRET:-your-secret-here-min-32-chars-12345}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      
      # Google OAuth (optional)
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
      
      # Next.js
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mount audio files for persistence
      - ./frontend/public/audio:/app/public/audio:ro

  # FastAPI Backend (minimal - health check only)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pronunciation_backend
    restart: unless-stopped
    environment:
      # Database (if backend needs it in future)
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-english_app}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      - db

volumes:
  postgres_data:
    name: pronunciation_postgres_data
