<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 32" fill="none">
  <!-- Victory flag for completed camps -->
  <!-- Pole -->
  <line x1="4" y1="4" x2="4" y2="30" stroke="#78350F" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Flag cloth -->
  <path d="M4 4 L20 8 L4 14Z" fill="#22C55E"/>
  <path d="M4 4 L20 8 L4 10Z" fill="#16A34A" opacity="0.6"/>
  <!-- Check mark on flag -->
  <path d="M8 8 L10 10 L14 6" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Base -->
  <ellipse cx="4" cy="30" rx="4" ry="1.5" fill="#78350F" opacity="0.4"/>
</svg>