<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 80" fill="none">
  <!-- Simple volcano -->
  <!-- Mountain body -->
  <path d="M5 75 L22 20 L30 10 L38 20 L55 75Z" fill="#9A3412"/>
  <!-- Darker side -->
  <path d="M30 10 L38 20 L55 75 L30 75Z" fill="#7C2D12" opacity="0.6"/>
  <!-- Crater -->
  <ellipse cx="30" cy="14" rx="10" ry="5" fill="#431407"/>
  <!-- Lava inside -->
  <ellipse cx="30" cy="14" rx="7" ry="3" fill="#EF4444"/>
  <ellipse cx="30" cy="13" rx="4" ry="2" fill="#FBBF24" opacity="0.8"/>
  <!-- Smoke puffs -->
  <circle cx="30" cy="5" r="4" fill="#9CA3AF" opacity="0.3"/>
  <circle cx="26" cy="0" r="3" fill="#9CA3AF" opacity="0.2"/>
  <circle cx="34" cy="-2" r="3.5" fill="#9CA3AF" opacity="0.15"/>
  <!-- Lava streams -->
  <path d="M28 18 C26 30, 20 45, 15 60" stroke="#EF4444" stroke-width="2" opacity="0.5" fill="none" stroke-linecap="round"/>
  <path d="M32 18 C34 28, 40 42, 45 58" stroke="#F97316" stroke-width="1.5" opacity="0.4" fill="none" stroke-linecap="round"/>
  <!-- Base rocks -->
